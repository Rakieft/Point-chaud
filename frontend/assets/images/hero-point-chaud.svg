<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">Hero Point Chaud</title>
  <desc id="desc">Composition gourmande premium avec plateau, sandwich, croissant, pate, boisson et elements de service Point Chaud.</desc>
  <defs>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ef"/>
      <stop offset="100%" stop-color="#ffd8b3"/>
    </linearGradient>
    <linearGradient id="breadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9cf86"/>
      <stop offset="100%" stop-color="#d68734"/>
    </linearGradient>
    <linearGradient id="breadDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7a754"/>
      <stop offset="100%" stop-color="#b7681f"/>
    </linearGradient>
    <linearGradient id="pizzaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
