<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nouveau mot de passe | Point Chaud</title>
    <link rel="icon" type="image/png" href="../assets/images/logo-point.png" />
    <link rel="shortcut icon" href="../assets/images/logo-point.png" />
    <link rel="apple-touch-icon" href="../assets/images/logo-point.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="container">
        <div id="reset-password-card" class="auth-card">
          <span class="badge">Securite du compte</span>
          <h1>Choisir un nouveau mot de passe</h1>
          <p class="muted">Le lien de reinitialisation est verifie avant de te laisser definir un nouveau mot de passe.</p>

          <div id="reset-password-message" class="message-box"></div>

          <form id="reset-password-form" class="stack" hidden>
            <label>Nouveau mot de passe <input name="password" type="password" minlength="6" required /></label>
            <label>Confirmer le mot de passe <input name="password_confirm" type="password" minlength="6" required /></label>
            <button class="btn-primary" type="submit">Mettre a jour le mot de passe</button>
          </form>

          <div id="reset-password-actions" class="stack" hidden>
            <a class="btn-primary" href="./login.html">Se connecter maintenant</a>
            <a class="btn btn-light" href="./forgot-password.html">Demander un nouveau lien</a>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
