<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription | Point Chaud</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="container">
        <div class="auth-card">
          <span class="badge">Creation de compte client</span>
          <h1>Rejoindre Point Chaud</h1>
          <p class="muted">Commande en ligne, validation manager, paiement differe et retrait securise.</p>
          <div id="form-message" class="message-box"></div>

          <form id="register-form" class="stack">
            <label>Nom complet <input name="name" required /></label>
            <label>Email <input name="email" type="email" required /></label>
            <label>Telephone <input name="phone" /></label>
            <label>Mot de passe <input name="password" type="password" required /></label>
            <button class="btn-primary" type="submit">Creer mon compte</button>
          </form>

          <p class="muted">Tu as deja un compte ? <a href="./login.html">Connecte-toi ici</a>.</p>
        </div>
      </section>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
