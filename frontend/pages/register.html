<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription | Point Chaud</title>
    <link rel="icon" type="image/png" href="../assets/images/logo-point.png" />
    <link rel="shortcut icon" href="../assets/images/logo-point.png" />
    <link rel="apple-touch-icon" href="../assets/images/logo-point.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="container">
        <div class="auth-card">
          <span class="badge">Création de compte client</span>
          <h1>Rejoindre Point Chaud</h1>
          <p class="muted">Commande en ligne, validation manager, paiement différé et retrait sécurisé.</p>
          <p class="muted">Une vérification d'email est maintenant demandée pour activer les comptes clients.</p>
          <div id="form-message" class="message-box"></div>

          <form id="register-form" class="stack">
            <label>Nom complet <input name="name" required /></label>
            <label>Email <input name="email" type="email" required /></label>
            <label>Téléphone <input name="phone" /></label>
            <label>Mot de passe <input name="password" type="password" required /></label>
            <button class="btn-primary" type="submit">Créer mon compte</button>
          </form>

          <section id="social-auth-panel" class="social-auth-panel" hidden>
            <div class="social-auth-divider"><span>ou créer avec</span></div>
            <div class="social-auth-stack">
              <div id="google-auth-slot" class="social-auth-slot">
                <div id="google-auth-button"></div>
              </div>
              <button id="apple-auth-button" class="btn btn-light social-apple-button" type="button" hidden>
                <span class="social-apple-mark" aria-hidden="true"></span>
                <span>Continuer avec Apple</span>
              </button>
            </div>
          </section>

          <p class="muted">Tu as déjà un compte ? <a href="./login.html">Connecte-toi ici</a>.</p>
        </div>
      </section>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
