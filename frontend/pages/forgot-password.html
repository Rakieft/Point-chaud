<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mot de passe oublie | Point Chaud</title>
    <link rel="icon" type="image/png" href="../assets/images/logo-point.png" />
    <link rel="shortcut icon" href="../assets/images/logo-point.png" />
    <link rel="apple-touch-icon" href="../assets/images/logo-point.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="container">
        <div class="auth-card">
          <span class="badge">Recuperation de compte</span>
          <h1>Reinitialiser le mot de passe</h1>
          <p class="muted">Entre ton email pour recevoir un lien de reinitialisation securise.</p>

          <div id="forgot-password-message" class="message-box"></div>

          <form id="forgot-password-form" class="stack">
            <label>Email <input name="email" type="email" required /></label>
            <button class="btn-primary" type="submit">Recevoir le lien</button>
          </form>

          <div id="forgot-password-preview-box" class="card compact-card stack" hidden>
            <strong>Lien de test local</strong>
            <p class="muted">Comme l'envoi email reel n'est pas encore branche, utilise ce lien pour tester :</p>
            <a id="forgot-password-preview-link" class="verification-link" href="#"></a>
          </div>

          <div class="stack">
            <a class="btn btn-light" href="./login.html">Retour a la connexion</a>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
