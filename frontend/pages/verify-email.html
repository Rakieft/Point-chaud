<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmation email | Point Chaud</title>
    <link rel="icon" type="image/png" href="../assets/images/logo-point.png" />
    <link rel="shortcut icon" href="../assets/images/logo-point.png" />
    <link rel="apple-touch-icon" href="../assets/images/logo-point.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="container">
        <div id="verify-email-card" class="auth-card">
          <span class="badge">Activation du compte</span>
          <h1>Verification en cours</h1>
          <p class="muted">Nous verifions ton adresse email pour activer ton compte client Point Chaud.</p>
          <div id="verify-email-message" class="message-box"></div>

          <div id="verify-email-actions" class="stack" hidden>
            <a class="btn-primary" href="./login.html">Se connecter maintenant</a>
            <a class="btn btn-light" href="./register.html">Retour a l'inscription</a>
          </div>
        </div>
      </section>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
